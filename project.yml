name: MorseLight

options:
  bundleIdPrefix: com.goodmai
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_TESTABILITY: YES
    GCC_OPTIMIZATION_LEVEL: "0"

targets:

  MorseLight:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MorseLight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.goodmai.MorseLight
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        # Privacy usage descriptions
        INFOPLIST_KEY_NSCameraUsageDescription: "Required to control the flashlight for Morse light transmission"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Required for microphone access and audio recording"
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "Required to save and export audio and video recordings"
        # SwiftUI lifecycle
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        # iPhone only
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - target: MorseLightWidget
        embed: true

  # Control Center widget extension (Epic E4 — iOS 18).
  # Shares the torch + encoder sources with the app target.
  MorseLightWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: MorseLightWidget
      - path: MorseLight/Domain/MorseCode.swift
      - path: MorseLight/Domain/MorseConverter.swift
      - path: MorseLight/Infrastructure/FlashlightController.swift
    info:
      path: MorseLightWidget/Info.plist
      properties:
        CFBundleDisplayName: MorseLight
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.goodmai.MorseLight.widget
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_NSCameraUsageDescription: "Required to control the flashlight for the SOS control"

  MorseLightTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MorseLightTests
    dependencies:
      - target: MorseLight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.goodmai.MorseLightTests

  MorseLightUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MorseLightUITests
    dependencies:
      - target: MorseLight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.goodmai.MorseLightUITests
        TEST_TARGET_NAME: MorseLight

schemes:
  MorseLight:
    build:
      targets:
        MorseLight: all
        MorseLightTests: [test]
        MorseLightUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - name: MorseLightTests
          parallelizable: true
          randomExecutionOrder: true
        - name: MorseLightUITests
          parallelizable: false
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
